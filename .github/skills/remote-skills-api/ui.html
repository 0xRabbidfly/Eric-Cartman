<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/en/7/77/EricCartman.png">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/en/7/77/EricCartman.png">
  <title>Skills Remote</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #6366f1;
      --accent-soft: #6366f120;
      --user-bubble: #6366f1;
      --bot-bubble: #1e1e2e;
      --success: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(34,197,94,.5);
      transition: all .3s;
    }
    .status-dot.busy {
      background: var(--warn);
      box-shadow: 0 0 6px rgba(245,158,11,.5);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
      transition: background .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: var(--accent-soft); }

    /* ── Skills drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      max-height: 70dvh;
      z-index: 51;
      transform: translateY(100%);
      transition: transform .3s ease;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border);
      margin: 10px auto 6px;
    }
    .drawer-title { padding: 8px 20px 12px; font-weight: 700; font-size: 16px; }
    .skill-list {
      overflow-y: auto; padding: 0 12px 20px;
      -webkit-overflow-scrolling: touch;
    }
    .skill-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background .15s;
      touch-action: manipulation;
    }
    .skill-item:active { background: var(--accent-soft); }
    .skill-item.active { background: var(--accent-soft); border: 1px solid var(--accent); }
    .skill-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .skill-info { flex: 1; min-width: 0; }
    .skill-name { font-weight: 600; font-size: 14px; }
    .skill-desc {
      font-size: 12px; color: var(--text-dim);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-top: 2px;
    }
    .skill-badge {
      font-size: 10px; padding: 2px 6px;
      border-radius: 6px; background: var(--surface2);
      color: var(--text-dim); margin-top: 4px; display: inline-block;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg { max-width: 85%; display: flex; flex-direction: column; }
    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .msg-bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-meta {
      font-size: 11px; color: var(--text-dim);
      margin-top: 4px; padding: 0 4px;
    }
    .msg.user .msg-meta { text-align: right; }

    /* Markdown inside bot bubbles */
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-size: 15px; font-weight: 700; margin: 8px 0 4px; }
    .msg-bubble p { margin: 4px 0; }
    .msg-bubble ul,.msg-bubble ol { padding-left: 18px; margin: 4px 0; }
    .msg-bubble code {
      background: rgba(255,255,255,.08); padding: 1px 5px;
      border-radius: 4px; font-size: 13px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,.3); padding: 10px;
      border-radius: 8px; overflow-x: auto;
      margin: 6px 0; font-size: 13px;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble table { border-collapse: collapse; margin: 6px 0; font-size: 13px; }
    .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 4px 8px; }
    .msg-bubble a { color: #818cf8; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; padding: 10px 14px; }
    .typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce .6s infinite alternate;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { to { opacity: .3; transform: translateY(-4px); } }

    /* ── Stream status bar ── */
    .stream-status {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
      border-radius: 12px 12px 0 0;
      background: var(--bot-bubble);
    }
    .stream-status .phase-icon {
      display: inline-flex;
      animation: pulse 1.2s infinite;
    }
    .stream-status .phase-text { flex: 1; }
    .stream-status .elapsed {
      font-variant-numeric: tabular-nums;
      opacity: .6;
    }

    /* Tool use pill */
    .tool-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; margin: 4px 4px 4px 0;
      border-radius: 12px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      font-size: 11px; color: var(--accent);
      white-space: nowrap;
    }
    .tool-pill .tool-spinner {
      width: 10px; height: 10px;
      border: 2px solid rgba(99,102,241,.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .tool-pill.done { opacity: .5; }
    .tool-pill.done .tool-spinner { animation: none; border-color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bot bubble streaming state */
    .msg-bubble.streaming {
      border-bottom-left-radius: 0;
    }
    .msg-bubble .cursor-blink::after {
      content: '▊';
      animation: blink 1s step-end infinite;
      color: var(--accent);
      font-weight: 300;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Done meta with cost */
    .msg-done-meta {
      display: flex; gap: 12px;
      font-size: 11px; color: var(--text-dim);
      margin-top: 4px; padding: 0 4px;
      opacity: .7;
    }
    .msg-done-meta span { white-space: nowrap; }

    /* ── Input bar ── */
    .input-bar {
      display: flex; flex-direction: column; gap: 6px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .skill-chip {
      display: none; align-items: center; gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      font-size: 12px; font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      align-self: flex-start;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      touch-action: manipulation;
    }
    .skill-chip.active { display: flex; }
    .skill-chip .x { margin-left: 2px; opacity: .6; flex-shrink: 0; }

    .input-row {
      display: flex; align-items: flex-end; gap: 8px;
      width: 100%;
    }
    .input-wrap {
      flex: 1; display: flex; align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 6px 6px 16px;
      transition: border-color .2s;
      min-width: 0;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #msgInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 16px;
      resize: none; max-height: 120px;
      line-height: 1.4; padding: 6px 0;
      font-family: inherit;
    }
    #msgInput::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none; color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:disabled { opacity: .3; cursor: default; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ── Welcome screen ── */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }
    .welcome-icon {
      width: 96px;
      height: 96px;
      margin-bottom: 16px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      box-shadow: 0 14px 32px rgba(0,0,0,.32);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .welcome h2 { font-size: 22px; margin-bottom: 8px; }
    .welcome p { color: var(--text-dim); font-size: 14px; max-width: 300px; line-height: 1.5; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; justify-content: center; }
    .quick-btn {
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .quick-btn:active { background: var(--accent-soft); border-color: var(--accent); }

    /* ── Modal + toast ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 80;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      width: min(100%, 380px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal-text {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.45;
      margin-bottom: 14px;
      white-space: pre-wrap;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      margin-bottom: 14px;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(max(18px, env(safe-area-inset-bottom)) + 74px);
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      background: rgba(20,20,24,.96);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      width: min(calc(100vw - 24px), 420px);
      font-size: 14px;
      line-height: 1.4;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 90;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { border-color: rgba(239,68,68,.55); }
    .toast.success { border-color: rgba(34,197,94,.55); }

    /* ── Utility ── */
    .hidden { display: none !important; }
    @media (min-width: 600px) {
      body { max-width: 500px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div id="statusDot" class="status-dot"></div>
      <h1>Skills</h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openDrawer()" title="Skills">⚡</button>
      <button class="icon-btn" onclick="promptSetToken()" title="Set API Token">🔑</button>
      <button class="icon-btn" onclick="restartServer()" title="Restart Server">🔁</button>
      <button class="icon-btn" onclick="cancelRequest()" title="Cancel">✕</button>
    </div>
  </div>

  <!-- Skills Drawer -->
  <div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="drawer" class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Available Skills</div>
    <div id="skillList" class="skill-list"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalText" class="modal-text"></div>
      <input id="modalInput" class="modal-input hidden" autocomplete="off">
      <div class="modal-actions">
        <button id="modalCancel" class="modal-btn" type="button">Cancel</button>
        <button id="modalConfirm" class="modal-btn primary" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Chat messages -->
  <div id="chatArea" class="chat-area">
    <div id="welcome" class="welcome">
      <div class="welcome-icon">
        <img src="https://upload.wikimedia.org/wikipedia/en/7/77/EricCartman.png" alt="Eric Cartman">
      </div>
      <h2>Eric Cartman Skills</h2>
      <p>Chat naturally or pick a skill. Running on your PC — accessible over Tailscale.</p>
      <div id="quickActions" class="quick-actions"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div id="skillChip" class="skill-chip" onclick="clearSkill()">
      <span id="chipName"></span><span class="x">✕</span>
    </div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Ask anything…" 
                  oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Markdown renderer (loaded from CDN since marked is lightweight) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    // ── State ──
    let API_TOKEN  = localStorage.getItem('skills_api_token');
    let sessionId  = localStorage.getItem('skills_session_id') || null;
    let skills     = [];
    let activeSkill = null;
    let isBusy      = false;
    let promptForTokenOnLoad = false;
    let modalResolver = null;
    let toastTimer = null;

    function updateSessionId(id) {
      if (id && id !== sessionId) {
        sessionId = id;
        localStorage.setItem('skills_session_id', id);
      }
    }

    // ── Auth ──
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token');
    if (urlToken) {
      API_TOKEN = urlToken;
      localStorage.setItem('skills_api_token', urlToken);
      history.replaceState({}, '', location.pathname);
    }
    if (!API_TOKEN) {
      promptForTokenOnLoad = true;
    }

    function showToast(message, kind = 'info', timeoutMs = 3200) {
      const el = document.getElementById('toast');
      clearTimeout(toastTimer);
      el.textContent = message;
      el.className = `toast ${kind} show`;
      toastTimer = setTimeout(() => {
        el.className = 'toast';
      }, timeoutMs);
    }

    function showModal(options = {}) {
      const overlay = document.getElementById('modalOverlay');
      const title = document.getElementById('modalTitle');
      const text = document.getElementById('modalText');
      const input = document.getElementById('modalInput');
      const cancel = document.getElementById('modalCancel');
      const confirm = document.getElementById('modalConfirm');

      title.textContent = options.title || 'Confirm';
      text.textContent = options.message || '';
      confirm.textContent = options.confirmLabel || 'OK';
      cancel.textContent = options.cancelLabel || 'Cancel';
      cancel.classList.toggle('hidden', options.showCancel === false);

      if (options.input) {
        input.classList.remove('hidden');
        input.type = options.inputType || 'text';
        input.value = options.inputValue || '';
        input.placeholder = options.inputPlaceholder || '';
      } else {
        input.classList.add('hidden');
        input.value = '';
      }

      overlay.classList.add('open');

      return new Promise(resolve => {
        modalResolver = resolve;
        setTimeout(() => {
          if (!input.classList.contains('hidden')) input.focus();
          else confirm.focus();
        }, 0);
      });
    }

    function closeModal(result) {
      const overlay = document.getElementById('modalOverlay');
      const input = document.getElementById('modalInput');
      overlay.classList.remove('open');
      input.blur();
      if (modalResolver) {
        const resolve = modalResolver;
        modalResolver = null;
        resolve(result);
      }
    }

    function wireModal() {
      const overlay = document.getElementById('modalOverlay');
      const input = document.getElementById('modalInput');
      document.getElementById('modalCancel').addEventListener('click', () => closeModal({ confirmed: false, value: '' }));
      document.getElementById('modalConfirm').addEventListener('click', () => closeModal({ confirmed: true, value: input.value }));
      overlay.addEventListener('click', (event) => {
        if (event.target === overlay) closeModal({ confirmed: false, value: '' });
      });
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') closeModal({ confirmed: true, value: input.value });
      });
    }

    async function validateToken(token) {
      const res = await fetch('/api/status', {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      return res.ok;
    }

    async function promptSetToken() {
      const result = await showModal({
        title: 'API Token',
        message: 'Paste API Secret for this device.',
        confirmLabel: 'Save',
        cancelLabel: 'Not now',
        showCancel: true,
        input: true,
        inputValue: API_TOKEN || '',
        inputPlaceholder: 'API secret',
      });
      if (!result?.confirmed) return;

      const candidate = (result.value || '').trim();
      if (!candidate) return;

      const previous = API_TOKEN;
      API_TOKEN = candidate;
      try {
        const ok = await validateToken(candidate);
        if (!ok) throw new Error('Invalid token');
        localStorage.setItem('skills_api_token', candidate);
        showToast('API token updated on this device.', 'success');
      } catch {
        API_TOKEN = previous;
        showToast('Token invalid. Existing token was kept.', 'error', 4200);
      }
    }

    // ── API helpers ──
    async function api(path, opts = {}) {
      const res = await fetch(path, {
        ...opts,
        headers: {
          'Authorization': `Bearer ${API_TOKEN}`,
          'Content-Type': 'application/json',
          ...(sessionId ? { 'X-Session-ID': sessionId } : {}),
          ...(opts.headers || {}),
        },
      });
      updateSessionId(res.headers.get('X-Session-ID'));
      if (res.status === 401) {
        localStorage.removeItem('skills_api_token');
        showToast('Invalid API secret. Reloading...', 'error', 1200);
        setTimeout(() => location.reload(), 1200);
        throw new Error('Unauthorized');
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.code = data.code;
        err.hint = data.hint;
        err.status = res.status;
        throw err;
      }
      return data;
    }

    // ── Skills ──
    async function loadSkills() {
      try {
        const data = await api('/api/skills');
        skills = data.skills || [];
        renderSkillList();
        renderQuickActions();
      } catch (e) {
        console.error('Failed to load skills:', e);
        const msg = e?.message || 'Unknown error';
        const hint = e?.hint ? `\n${e.hint}` : '';
        addMessage('bot', `❌ Skills load failed: ${msg}${hint}`);
      }
    }

    function skillIcon(name) {
      const icons = {
        'obsidian': '💎', 'last30days': '📰', 'visual-explainer': '🎨',
        'session-log': '📝', 'project-guide': '🗺️', 'content-research-writer': '✍️',
        'skill-reflection': '🪞', 'insights-report': '📊', 'health-audit': '🩺',
        'repo-state-sync': '🔄', 'used-car-search': '🚗', 'rbc-banking': '🏦',
        'humanizer': '🧑', 'podcast-to-obsidian': '🎙️', 'project-scaffold': '🏗️',
        'obsidian-daily-research': '🔬', 'obsidian-vault-digest': '📚',
        'obsidian-vault-linker': '🔗', 'obsidian-linked-research': '🔖',
        'agentic-evaluator': '🏆',
        'session_context_optimizer': '⚙️', 'session-context-audit': '🔍',
        'session-learning': '🧠', 'session-skill-forge': '🔥',
        'branch-wrapup': '🎁', 'doc-sync-all': '📄', 'project-infographic': '📈',
        'teams-daily-digest': '💬', 'find-skills': '🔎', 'git-commit': '📦',
      };
      return icons[name] || '⚡';
    }

    function renderSkillList() {
      const el = document.getElementById('skillList');
      el.innerHTML = skills.map(s => `
        <div class="skill-item ${activeSkill === s.name ? 'active' : ''}" onclick="selectSkill('${s.name}')">
          <div class="skill-icon">${skillIcon(s.name)}</div>
          <div class="skill-info">
            <div class="skill-name">${s.name}</div>
            <div class="skill-desc">${escHtml(s.description)}</div>
            <div class="skill-badge">${s.source === 'personal' ? '🔒 personal' : '🌐 open-source'}</div>
          </div>
        </div>
      `).join('');
    }

    function renderQuickActions() {
      const invocable = skills.filter(s => s.invocable);
      // Sort by usage count descending; ties keep discovery order
      const top = invocable
        .slice()
        .sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0))
        .slice(0, 6);
      const el = document.getElementById('quickActions');
      el.innerHTML = top.map(s => {
        const badge = s.usageCount > 0
          ? `<span style="opacity:.45;font-size:11px;margin-left:3px">${s.usageCount}×</span>`
          : '';
        return `<button class="quick-btn" onclick="selectSkill('${s.name}'); closeDrawer();">${skillIcon(s.name)} ${s.name}${badge}</button>`;
      }).join('');
    }

    function selectSkill(name) {
      activeSkill = activeSkill === name ? null : name;
      document.getElementById('skillChip').classList.toggle('active', !!activeSkill);
      document.getElementById('chipName').textContent = activeSkill ? `${skillIcon(activeSkill)} ${activeSkill}` : '';
      renderSkillList();
      closeDrawer();
      document.getElementById('msgInput').focus();
    }

    function clearSkill() {
      activeSkill = null;
      document.getElementById('skillChip').classList.remove('active');
      renderSkillList();
    }

    // ── Drawer ──
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }

    // ── Chat ──
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function renderMarkdown(text) {
      try {
        if (typeof marked !== 'undefined' && marked.parse) {
          return marked.parse(text, { breaks: true });
        }
      } catch {}
      return `<pre style="white-space:pre-wrap;">${escHtml(text)}</pre>`;
    }

    function addMessage(role, content, meta) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.classList.add('hidden');

      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'bot') {
        bubble.innerHTML = renderMarkdown(content);
      } else {
        bubble.textContent = content;
      }
      div.appendChild(bubble);

      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'msg-meta';
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }

      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
      return div;
    }

    function addTyping() {
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.id = 'typingIndicator';
      div.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function addStreamingMessage(meta) {
      const area = document.getElementById('chatArea');
      const div = document.createElement('div');
      div.className = 'msg bot';

      const status = document.createElement('div');
      status.className = 'stream-status';
      status.innerHTML = '<span class="phase-icon">🧠</span><span class="phase-text">Starting…</span><span class="elapsed">0.0s</span>';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble streaming';
      bubble.innerHTML = '<span class="cursor-blink"></span>';

      const tools = document.createElement('div');
      tools.style.marginTop = '6px';

      div.appendChild(status);
      div.appendChild(bubble);
      div.appendChild(tools);

      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'msg-meta';
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }

      area.appendChild(div);
      area.scrollTop = area.scrollHeight;

      const phaseIcon = status.querySelector('.phase-icon');
      const phaseText = status.querySelector('.phase-text');
      const elapsedEl = status.querySelector('.elapsed');

      let textBuffer = '';
      const toolPills = new Map();

      const startedAt = Date.now();
      const timer = setInterval(() => {
        const secs = ((Date.now() - startedAt) / 1000).toFixed(1);
        elapsedEl.textContent = `${secs}s`;
      }, 100);

      function renderText() {
        if (!textBuffer.trim()) {
          bubble.innerHTML = '<span class="cursor-blink"></span>';
          return;
        }
        bubble.innerHTML = renderMarkdown(textBuffer + '<span class="cursor-blink"></span>');
      }

      return {
        setPhase(icon, text) {
          phaseIcon.textContent = icon;
          phaseText.textContent = text;
          const area = document.getElementById('chatArea');
          area.scrollTop = area.scrollHeight;
        },
        appendText(chunk) {
          textBuffer += chunk;
          renderText();
          const area = document.getElementById('chatArea');
          area.scrollTop = area.scrollHeight;
        },
        toolStart(name, id) {
          const key = id || name || `${Date.now()}-${Math.random()}`;
          const pill = document.createElement('span');
          pill.className = 'tool-pill';
          pill.innerHTML = `<span class="tool-spinner"></span>${escHtml(name || 'tool')}`;
          toolPills.set(key, pill);
          tools.appendChild(pill);
          this.setPhase('🛠️', `Using ${name || 'tool'}…`);
        },
        toolDone(id) {
          if (id && toolPills.has(id)) {
            toolPills.get(id).classList.add('done');
            this.setPhase('🧠', 'Thinking…');
            return;
          }
          for (const pill of toolPills.values()) {
            if (!pill.classList.contains('done')) {
              pill.classList.add('done');
              break;
            }
          }
          this.setPhase('🧠', 'Thinking…');
        },
        done(finalText, metaData) {
          clearInterval(timer);
          if (finalText && finalText.trim()) {
            textBuffer = finalText;
          }
          bubble.classList.remove('streaming');
          bubble.innerHTML = renderMarkdown(textBuffer || 'Done (no output)');
          status.remove();

          if (metaData && (metaData.duration || metaData.cost || metaData.totalCost)) {
            const doneMeta = document.createElement('div');
            doneMeta.className = 'msg-done-meta';
            const bits = [];
            if (metaData.duration) bits.push(`<span>⏱ ${metaData.duration}s</span>`);
            if (metaData.cost != null) bits.push(`<span>💲 ${Number(metaData.cost).toFixed(4)}</span>`);
            if (metaData.totalCost != null) bits.push(`<span>Σ ${Number(metaData.totalCost).toFixed(4)}</span>`);
            if (metaData.numTurns != null) bits.push(`<span>🔁 ${metaData.numTurns}</span>`);
            doneMeta.innerHTML = bits.join('');
            div.appendChild(doneMeta);
          }

          const area = document.getElementById('chatArea');
          area.scrollTop = area.scrollHeight;
        },
        fail(error) {
          clearInterval(timer);
          status.remove();
          bubble.classList.remove('streaming');
          bubble.textContent = `❌ Error: ${error}`;
          const area = document.getElementById('chatArea');
          area.scrollTop = area.scrollHeight;
        }
      };
    }

    function parseSSE(raw) {
      const events = [];
      const blocks = raw.split('\n\n');
      for (const block of blocks) {
        if (!block.trim()) continue;
        const lines = block.split('\n');
        let data = '';
        for (const line of lines) {
          if (line.startsWith('data:')) data += line.slice(5).trim();
        }
        if (!data) continue;
        try { events.push(JSON.parse(data)); } catch {}
      }
      return events;
    }

    async function streamChat(message, skillForMsg) {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_TOKEN}`,
          'Content-Type': 'application/json',
          'Accept': 'text/event-stream',
          ...(sessionId ? { 'X-Session-ID': sessionId } : {}),
        },
        body: JSON.stringify({ message, skill: skillForMsg }),
      });
      updateSessionId(response.headers.get('X-Session-ID'));

      if (response.status === 401) {
        localStorage.removeItem('skills_api_token');
        throw new Error('Unauthorized');
      }
      if (!response.ok || !response.body) {
        let payload = {};
        try { payload = await response.json(); } catch {}
        const code = payload?.code ? ` (${payload.code})` : '';
        const hint = payload?.hint ? ` — ${payload.hint}` : '';
        throw new Error(`${payload?.error || `HTTP ${response.status}`}${code}${hint}`);
      }

      const bot = addStreamingMessage(skillForMsg ? `skill: ${skillForMsg}` : null);
      bot.setPhase('🧠', 'Thinking…');

      try {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let sawDone = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const idx = buffer.lastIndexOf('\n\n');
          if (idx === -1) continue;

          const chunk = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          const events = parseSSE(chunk + '\n\n');

          for (const evt of events) {
            if (evt.type === 'heartbeat') continue; // Server keepalive — ignore
            if (evt.type === 'start') {
              if (evt.sessionId) updateSessionId(evt.sessionId);
              bot.setPhase('🧠', 'Starting…');
            } else if (evt.type === 'init') {
              bot.setPhase('🧠', 'Session ready…');
            } else if (evt.type === 'thinking_start') {
              bot.setPhase('🧠', 'Thinking…');
            } else if (evt.type === 'thinking') {
              bot.setPhase('🧠', 'Reasoning…');
            } else if (evt.type === 'tool_start') {
              bot.toolStart(evt.tool, evt.id);
            } else if (evt.type === 'tool_result') {
              bot.toolDone(evt.id);
            } else if (evt.type === 'text') {
              bot.setPhase('✍️', 'Writing…');
              bot.appendText(evt.text || '');
            } else if (evt.type === 'done') {
              sawDone = true;
              bot.done(evt.result, evt);
            } else if (evt.type === 'error') {
              const code = evt.code ? ` (${evt.code})` : '';
              const hint = evt.hint ? ` — ${evt.hint}` : '';
              const message = `${evt.error || 'Unknown error'}${code}${hint}`;
              bot.fail(message);
              throw new Error(message);
            }
          }
        }

        if (!sawDone) {
          bot.done();
        }
      } catch (err) {
        // Network-level error (e.g. Safari "Load failed" when SSE connection drops)
        const isNetworkError = /load failed|failed to fetch|network|aborted/i.test(err.message);
        if (isNetworkError) {
          bot.fail('📡 Connection lost — skill may still be running in background. Check Obsidian or server logs.');
        } else {
          bot.fail(err.message);
        }
        return; // bot.fail() already displayed the error
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || isBusy) return;

      const skillForMsg = activeSkill;
      const meta = skillForMsg ? `via ${skillForMsg}` : null;
      addMessage('user', text, meta);
      input.value = '';
      input.style.height = 'auto';
      autoGrow(input);
      updateSendBtn();

      isBusy = true;
      setBusy(true);

      try {
        await streamChat(text, skillForMsg);
      } catch (err) {
        // Initial connection failure (before streaming starts)
        const isNetworkError = /load failed|failed to fetch|network|aborted/i.test(err.message);
        const msg = isNetworkError
          ? '📡 Connection lost — the skill may still be running in the background. Check back shortly.'
          : `❌ Error: ${err.message}`;
        addMessage('bot', msg);
      } finally {
        isBusy = false;
        setBusy(false);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitForServer(timeoutMs = 15000, intervalMs = 750) {
      const deadline = Date.now() + timeoutMs;
      while (Date.now() < deadline) {
        try {
          await api('/api/status');
          return true;
        } catch {}
        await sleep(intervalMs);
      }
      return false;
    }

    async function restartServer() {
      const result = await showModal({
        title: 'Restart Server',
        message: 'Restart the server? You will need to reconnect after a few seconds.',
        confirmLabel: 'Restart',
        cancelLabel: 'Cancel',
        showCancel: true,
      });
      if (!result?.confirmed) return;

      if (isBusy) {
        showToast('Server is busy. Wait for the current request to finish or use Cancel first.', 'error', 4200);
        return;
      }

      addMessage('bot', '🔁 Restart requested. Waiting for the server to come back...');
      showToast('Restarting server...', 'info', 2000);
      isBusy = true;
      setBusy(true);

      try {
        await api('/api/admin/restart', { method: 'POST', body: JSON.stringify({ force: true }) });
      } catch (err) {
        const isNetworkError = /load failed|failed to fetch|network|aborted/i.test(err.message);
        if (!isNetworkError) {
          const hint = err?.hint ? `\n${err.hint}` : '';
          showToast(`Restart failed: ${err.message}${hint}`, 'error', 5200);
          isBusy = false;
          setBusy(false);
          return;
        }
      }

      const restored = await waitForServer();
      isBusy = false;
      setBusy(false);

      if (restored) {
        showToast('Server restarted. Reloading now.', 'success', 900);
        setTimeout(() => location.reload(), 900);
        return;
      }

      showToast('Restart was requested, but the server did not come back in time. Refresh in a few seconds and check server.log if needed.', 'error', 5200);
    }

    async function cancelRequest() {
      try {
        const result = await api('/api/cancel', { method: 'POST' });
        showToast(result.cancelled ? 'Cancelled active request.' : (result.message || 'Nothing running.'), result.cancelled ? 'success' : 'info');
      } catch (err) {
        showToast(`Cancel failed: ${err.message}`, 'error', 4200);
      }
    }

    // ── Status polling ──
    function setBusy(busy) {
      document.getElementById('statusDot').classList.toggle('busy', busy);
      document.getElementById('sendBtn').disabled = busy || !document.getElementById('msgInput').value.trim();
    }

    async function pollStatus() {
      try {
        const data = await api('/api/status');
        if (!isBusy) {
          setBusy(data.active);
          if (data.active) isBusy = true;
        }
      } catch {}
    }
    setInterval(pollStatus, 3000);

    // ── Input helpers ──
    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function updateSendBtn() {
      const btn = document.getElementById('sendBtn');
      btn.disabled = isBusy || !document.getElementById('msgInput').value.trim();
    }

    document.getElementById('msgInput').addEventListener('input', updateSendBtn);

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ── Init ──
    wireModal();
    loadSkills();
    if (promptForTokenOnLoad) {
      setTimeout(() => {
        promptSetToken();
      }, 150);
    }
  </script>
